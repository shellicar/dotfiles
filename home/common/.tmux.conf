set -g default-terminal "tmux-256color"
set -g allow-passthrough on
set -ga terminal-overrides ",xterm-256color:Tc"
set -s escape-time 25

# terminal title: server (socket label) » session » window
set -g set-titles on
set -g set-titles-string "#{b:socket_path} » #S » #{?#{@title},#{@title},#{b:pane_current_path}}"


set -g set-clipboard off
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "tmux-copy"
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "tmux-copy"

bind-key -n DoubleClick1Pane copy-mode -M \; send-keys -X select-word \; send-keys -X copy-pipe-and-cancel "tmux-copy"
bind-key -n TripleClick1Pane copy-mode -M \; send-keys -X select-line \; send-keys -X copy-pipe-and-cancel "tmux-copy"

# process
set-hook -g session-closed 'run-shell "tmux list-panes -t #{session_name} -F \"#{pane_pid}\" | xargs -r kill -TERM"'
set-hook -g pane-focus-in 'run-shell "~/dotfiles/.local/bin/tmux-vscode-workspace.sh"'
set -g focus-events on

# mouse
set -g mouse on
bind-key -n MouseDrag1Pane copy-mode -M
# set -g mouse-select-window on
# set -g mouse-select-pane on
# set -g mouse-resize-pane on

# reload config
bind r source-file ~/.tmux.conf

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# choose-tree (prefix-s / prefix-w) — pure tmux format, no shell out (per-row
# subprocess spawning is too slow). Three branches selected by tmux's row-type
# booleans (#{session_format} / #{window_format} / #{pane_format}). Pieces are
# stored as user options for readability; the bind composes them.
set -g @ct-session-fmt "#{session_windows} windows#{?session_attached, (attached),}"
set -g @ct-window-fmt "#{?#{@status},#{@status} ,}#[fg=#{?#{@colour},#{@colour},colour250}]#{?#{@title},#{@title},#{b:pane_current_path}}#{?#{@role}, #[fg=colour209]#{@role},}#{?#{@state}, #[fg=colour141][#{@state}],}#[default]"
set -g @ct-pane-fmt "#{?#{@status},#{@status} ,}#{?#{@role},#[fg=colour209]#{@role},#[fg=colour250]#{pane_current_command}}#[default]"
bind s choose-tree -Zs -F "#{?session_format,#{E:@ct-session-fmt},#{?window_format,#{E:@ct-window-fmt},#{E:@ct-pane-fmt}}}"
bind w choose-tree -Zw -F "#{?session_format,#{E:@ct-session-fmt},#{?window_format,#{E:@ct-window-fmt},#{E:@ct-pane-fmt}}}"

# resize panes
bind -r h resize-pane -L 5
bind -r l resize-pane -R 5
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

######################
### DESIGN CHANGES ###
######################


## Status bar design
# Status line
set -g status-justify left
set -g status-interval 1

# Messaging
set -g message-command-style fg=blue,bg=black



# Info on left (I don't have a session display for now)
set -g status-left ''

# Loud or quiet?
set-option -g visual-activity off
set-option -g visual-bell off
set-option -g visual-silence off
set-window-option -g monitor-activity off
set-option -g bell-action any

# The modes
setw -g clock-mode-colour colour135
setw -g mode-style bold,fg=colour196,bg=colour238

# The panes
set -g pane-border-style fg=colour238,bg=colour235
set -g pane-active-border-style fg=colour51,bg=colour236

# The statusbar
set -g status-position bottom
set -g status-style fg=colour245,bg=default
set -g status-right '#[fg=colour233,bg=colour241,bold] %d/%m #[fg=colour233,bg=colour245,bold] %H:%M:%S '
set -g status-right-length 50
set -g status-left-length 20

setw -g window-status-current-style fg=colour255,bg=default,underscore
setw -g window-status-current-format "#(~/dotfiles/.config/tmux/window-status.sh --current #I #P #{pane_pid} '#{pane_current_path}' '#{@title}' '#{@colour}' '#{@state}' '#{@role}' '#{@status}')#[fg=colour50]#{p1:window_flags}"
setw -g window-status-format         "#(~/dotfiles/.config/tmux/window-status.sh #I #P #{pane_pid} '#{pane_current_path}' '#{@title}' '#{@colour}' '#{@state}' '#{@role}' '#{@status}')#[fg=colour244]#{p1:window_flags}"


setw -g window-status-style fg=colour250,bg=default

setw -g window-status-bell-style bold,fg=colour255,bg=colour1

# The messages
set -g message-style bold,fg=colour232,bg=colour166

bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

set -as terminal-features ',xterm*:extkeys'
set -s extended-keys always
set -s extended-keys-format csi-u

set-environment -g LANG C.UTF-8
